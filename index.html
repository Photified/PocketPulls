<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Pulls</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-bar">
        <h1 class="logo-text">Pocket Pulls</h1>
    </header>

    <div class="app-container">
        
        <div id="home-view">
            <h2 class="section-title" style="margin-bottom: 15px;">Select a Set</h2>
            <div id="sets-container">
                <p class="loading-text">Loading All Sets...</p>
            </div>
        </div>

        <div id="set-view" class="hidden">
            
            <div class="set-header-box">
                <div class="set-title-group">
                    <img id="current-set-symbol" src="" alt="Symbol" class="header-symbol hidden">
                    <h2 id="current-set-title" class="section-title">Loading Set...</h2>
                </div>
                <button id="back-button" class="btn-back">◀ Back</button>
            </div>
            
            <div class="chase-content-box">
                <p class="subtitle">Top 5 Market Chases</p>
                <div id="chase-container" class="scrolling-wrapper">
                    </div>
            </div>
            
        </div>

    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-image" src="" alt="Expanded Card">
    </div>

    <script src="app.js"></script>
</body>
</html>
